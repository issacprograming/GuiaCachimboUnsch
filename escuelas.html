  <script src="script.js"></script>
  <script>
  const facultades = {
    iqm: {
      nombre: 'Ingeniería Química y Metalurgia',
      escuelas: [
        { id: 'quimica',        nombre: 'Ingeniería Química',                      escudo: 'quimica.png' },
        { id: 'alimentarias',   nombre: 'Ingeniería en Industrias Alimentarias',   escudo: 'alimentarias.png' },
        { id: 'agroindustrial', nombre: 'Ingeniería Agroindustrial',               escudo: 'agroindustrial.png' },
      ]
    },
    sociales: {
      nombre: 'Ciencias Sociales',
      escuelas: [
        { id: 'ts',           nombre: 'Trabajo Social',                        escudo: 'ts.png' },
        { id: 'antropologia', nombre: 'Antropología Social',                   escudo: 'antropologia.png' },
        { id: 'comunicacion', nombre: 'Ciencias de la Comunicación',           escudo: 'comunicacion.png' },
        { id: 'arqueologia',  nombre: 'Arqueología e Historia (Arqueología)',  escudo: 'arqueologia.png' },
        { id: 'historia',     nombre: 'Arqueología e Historia (Historia)',     escudo: 'arqueologia.png' },
      ]
    },
    imgc: {
      nombre: 'Ingeniería de Minas, Geología y Civil',
      escuelas: [
        { id: 'minas',    nombre: 'Ingeniería de Minas',                        escudo: 'minas.png' },
        { id: 'civil',    nombre: 'Ingeniería Civil',                           escudo: 'civil.png' },
        { id: 'sistemas', nombre: 'Ingeniería de Sistemas',                     escudo: 'sistemas.png' },
        { id: 'fisica',   nombre: 'Ciencias Físico-Matemáticas (Física)',       escudo: 'fisicomate.png' },
        { id: 'mate',     nombre: 'Ciencias Físico-Matemáticas (Matemática)',   escudo: 'fisicomate.png' },
        { id: 'estad',    nombre: 'Ciencias Físico-Matemáticas (Estadística)',  escudo: 'fisicomate.png' },
      ]
    },
    cb: {
      nombre: 'Ciencias Biológicas',
      escuelas: [
        { id: 'micro',    nombre: 'Biología (Microbiología)',                  escudo: 'biologia.png' },
        { id: 'bio',      nombre: 'Biología (Biotecnología)',                  escudo: 'biologia.png' },
        { id: 'ecologia', nombre: 'Biología (Ecología y Recursos Naturales)', escudo: 'biologia.png' },
      ]
    },
    ce: {
      nombre: 'Ciencias de la Educación',
      escuelas: [
        { id: 'inicial',   nombre: 'Educación Inicial',                                    escudo: 'inicial.png' },
        { id: 'primaria',  nombre: 'Educación Primaria',                                   escudo: 'primaria.png' },
        { id: 'lengua',    nombre: 'Educación Sec. — Lengua Española y Literatura',        escudo: 'secundaria.png' },
        { id: 'matfis',    nombre: 'Educación Sec. — Matemática, Física e Informática',    escudo: 'secundaria.png' },
        { id: 'ingles',    nombre: 'Educación Sec. — Inglés y Lengua Española',            escudo: 'secundaria.png' },
        { id: 'socfil',    nombre: 'Educación Sec. — Ciencias Sociales y Filosofía',       escudo: 'secundaria.png' },
        { id: 'edufisica', nombre: 'Educación Física',                                     escudo: 'edufisica.png' },
      ]
    },
    ca: {
      nombre: 'Ciencias Agrarias',
      escuelas: [
        { id: 'agronomia',    nombre: 'Agronomía',              escudo: 'agronomia.png' },
        { id: 'agricola',     nombre: 'Ingeniería Agrícola',    escudo: 'agricola.png' },
        { id: 'mv',           nombre: 'Medicina Veterinaria',   escudo: 'mv.png' },
        { id: 'agroforestal', nombre: 'Ingeniería Agroforestal',escudo: 'agroforestal.png' },
      ]
    },
    dcp: {
      nombre: 'Derecho y Ciencias Políticas',
      escuelas: [
        { id: 'derecho', nombre: 'Derecho', escudo: 'derecho.png' },
      ]
    },
    cs: {
      nombre: 'Ciencias de la Salud',
      escuelas: [
        { id: 'obstetricia', nombre: 'Obstetricia',           escudo: 'ob.png' },
        { id: 'enfermeria',  nombre: 'Enfermería',             escudo: 'enfermeria.png' },
        { id: 'farmacia',    nombre: 'Farmacia y Bioquímica',  escudo: 'farmacia.png' },
        { id: 'mh',          nombre: 'Medicina Humana',        escudo: 'mh.png' },
      ]
    },
    faceac: {
      nombre: 'Ciencias Económicas, Administrativas y Contables',
      escuelas: [
        { id: 'admi',     nombre: 'Administración de Empresas', escudo: 'admi.png' },
        { id: 'conta',    nombre: 'Contabilidad y Auditoría',   escudo: 'conta.png' },
        { id: 'economia', nombre: 'Economía',                   escudo: 'economia.png' },
      ]
    }
  };

  // ── LEER URL ──
  const params   = new URLSearchParams(window.location.search);
  const facId    = params.get('facultad');
  const facultad = facultades[facId];

  if (facultad) {
    document.getElementById('hero-titulo').innerHTML = 'Escuelas de <em>' + facultad.nombre + '</em>';
    document.title = 'Escuelas — ' + facultad.nombre;

    const grid = document.getElementById('escuelas-grid');
    facultad.escuelas.forEach(esc => {
      const escudoSrc = `imagenes/escudos/${esc.escudo}`;
      const docUrl    = `documentos.html?facultad=${facId}&escuela=${esc.id}`;

      const card = document.createElement('div');
      card.className = 'esc-card';
      card.innerHTML = `
        <div class="esc-card-escudo-wrap" onclick="abrirVisor('${escudoSrc}', '${esc.nombre}')">
          <div class="fac-card-escudo esc-escudo-circulo">
            <img src="${escudoSrc}" alt="Escudo ${esc.nombre}">
            
          </div>
        </div>
        <div class="esc-card-info">
          <h3>${esc.nombre}</h3>
          <a href="${docUrl}" class="btn-ver-docs">📄 Ver documentos</a>
        </div>
      `;
      grid.appendChild(card);
    });

  } else {
    window.location.href = 'facultades.html';
  }

  // ── VISOR ──
  function abrirVisor(src, nombre) {
    document.getElementById('visor-img').src = src;
    document.getElementById('visor-img').alt = nombre;
    document.getElementById('visor').classList.add('activo');
    document.body.style.overflow = 'hidden';
  }

  function cerrarVisor() {
    document.getElementById('visor').classList.remove('activo');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') cerrarVisor();
  });
  </script>
